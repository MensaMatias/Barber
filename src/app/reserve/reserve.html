<div class="appointments-selection">
    <h2>My Appointments</h2>
    @if (appointments.length === 0) {
        <p>No appointments found.</p>
    } @else {
        @for (appointment of appointments; track appointment.id) {
            <div class="appointment-card">
                <h3>{{appointment.service}}</h3>
                <p>Date: {{appointment.date}}</p>
                <p>Time: {{appointment.time}}</p>
                <button class="cancel-btn" (click)="deleteAppointment(appointment.id)">
                    Cancel Appointment
                </button>
            </div>
        }
    }

</div>

<div class="reserve-container">
    <h2>Reserve an Appointment</h2>

    <label for="service">Service:</label>
    <select id="service" [(ngModel)]="service">
        <option value="">Select a service</option>
        <option value="Haircut">Haircut</option>
        <option value="Beard-trim">Beard Trim</option>
        <option value="Haircut + Beard">Haircut + Beard</option>
    </select>

    <label for="date">Date:</label>
    <input id="date" type="date" [(ngModel)]="date" [min]="today" (change)="time = ''" />

    <label for="time">Time:</label>
    <select id="time" [(ngModel)]="time">
        <option value="">Select a time</option>
        @for (availableTime of getAvailableTimes(); track availableTime) {
        <option [value]="availableTime">
            {{ availableTime }}
        </option>
}   
    </select>

    <button (click)="reserve()">
        Book Appointment
    </button>
</div>
